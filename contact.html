<!doctype html>
<html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Randevu Formu | Elçi Veteriner Kliniği</title><link rel="stylesheet" href="/assets/css/styles.css"><link rel="stylesheet" href="/assets/css/site-standard.css?v=unified-2"></head><body><main class="container page-hero"><h1>Randevu Formu</h1><form name="randevu"
      method="POST"
      data-netlify="true"
      action="/randevu-gonderildi"
      netlify-honeypot="bot-field">
  <input type="hidden" name="form-name" value="randevu">
  <p class="hidden"><label>Bot: <input name="bot-field"></label></p>

  <label>Ad Soyad <input type="text" name="adsoyad" required></label>
  <label>Telefon (WhatsApp) <input type="tel" name="telefon" required></label>
  <label>Evcil Türü
    <select name="tur"><option>Kedi</option><option>Köpek</option><option>Diğer</option></select>
  </label>
  <label>İstenen Tarih/Saat <input type="datetime-local" name="tarih" required></label>
  <label>Notlar <textarea name="not"></textarea></label>

  <button type="submit">Randevu Al</button>
</form></main><script defer src="/assets/js/site-standard.js?v=unified-2"></script></body></html>
