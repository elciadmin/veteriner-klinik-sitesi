<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <title>İçerik Paneli | Elçi Veteriner Kliniği</title>
  <style>
    .elci-admin-home{
      position:fixed;right:14px;bottom:14px;z-index:99999;
      padding:10px 15px;border-radius:999px;color:#fff!important;
      background:linear-gradient(90deg,#5a1fa8,#25cfe5);
      text-decoration:none;font:700 13px/1.2 system-ui;
      box-shadow:0 10px 26px rgba(0,0,0,.22)
    }
  </style>
</head>
<body>
  <a class="elci-admin-home" href="/admin/">← Yönetim Merkezi</a>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on('init', function(user) {
        if (!user) {
          window.netlifyIdentity.on('login', function() {
            window.location.href = '/admin/cms.html';
          });
        }
      });
    }
  </script>
</body>
</html>
