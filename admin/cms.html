<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <title>İçerik Paneli | Elçi Veteriner Kliniği</title>
  <style>
    .elci-admin-home{position:fixed;right:14px;bottom:14px;z-index:99999;padding:11px 16px;border-radius:999px;color:#fff!important;background:linear-gradient(90deg,#5a1fa8,#25cfe5);text-decoration:none;font:800 13px/1.2 system-ui;box-shadow:0 10px 26px rgba(0,0,0,.22)}
    .elci-branch{position:fixed;left:14px;bottom:14px;z-index:99999;padding:9px 13px;border-radius:999px;background:#e9fff3;color:#08753f;font:800 12px/1.2 system-ui;border:1px solid #9fe0bb}
  </style>
  <script>window.CMS_MANUAL_INIT=true;</script>
</head>
<body>
  <a class="elci-admin-home" href="/admin/">← Yönetim Merkezi</a>
  <span class="elci-branch" id="branchBadge">Bağlantı hazırlanıyor…</span>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    (function(){
      const isTest=/deploy-preview|netlify\.app$/i.test(location.hostname)&&!/veteriner-klinik-sitesi\.netlify\.app$/i.test(location.hostname);
      const branch=isTest?'elci-yonetim-v3-test':'main';
      document.getElementById('branchBadge').textContent=(isTest?'TEST':'CANLI')+' · '+branch;
      CMS.init({config:{load_config_file:true,backend:{name:'git-gateway',branch:branch}}});
      if(window.netlifyIdentity){
        window.netlifyIdentity.on('init',user=>{if(!user)window.netlifyIdentity.on('login',()=>location.href='/admin/cms.html')});
      }
    })();
  </script>
</body>
</html>
