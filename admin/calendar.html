<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>Paylaşım Takvimi | Elçi</title><link rel="stylesheet" href="/admin/admin.css?v=final-1"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"><style>.calendar-shell{max-width:1180px;margin:auto;padding:20px}.calendar-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:18px}.calendar-nav{display:flex;gap:8px}.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}.weekday,.day{border:1px solid #e4e9ef;border-radius:15px;background:#fff}.weekday{padding:9px;text-align:center;font-weight:850;color:#5a1fa8}.day{min-height:130px;padding:10px}.day.is-out{opacity:.42}.day strong{display:block;margin-bottom:7px}.event{display:block;margin:5px 0;padding:7px 8px;border-radius:9px;background:#f0e8fb;color:#421078;font-size:11px;font-weight:750;text-decoration:none}.event.announcement{background:#e5faff;color:#086778}.event.draft{background:#f4f4f4;color:#687782}.back{display:inline-flex;margin-bottom:14px}.empty{padding:20px;border:1px dashed #ccd6df;border-radius:14px;background:#fff}@media(max-width:760px){.calendar{grid-template-columns:1fr}.weekday{display:none}.day{min-height:auto}.day.is-out{display:none}}</style></head><body><div class="calendar-shell"><a class="btn back" href="/admin/">← Yönetim Merkezi</a><div class="calendar-head"><div><span class="kicker">YAYIN PLANI</span><h1 id="monthTitle">Paylaşım Takvimi</h1></div><div class="calendar-nav"><button class="btn" id="prev">‹ Önceki</button><button class="btn" id="today">Bugün</button><button class="btn" id="next">Sonraki ›</button></div></div><div class="calendar" id="calendar"></div></div><script>(()=>{let cursor=new Date();cursor.setDate(1);let posts=[];const cal=document.getElementById('calendar'),title=document.getElementById('monthTitle');const weekdays=['Pzt','Sal','Çar','Per','Cum','Cmt','Paz'];const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));function render(){title.textContent=cursor.toLocaleDateString('tr-TR',{month:'long',year:'numeric'});const first=new Date(cursor),offset=(first.getDay()+6)%7,start=new Date(first);start.setDate(first.getDate()-offset);let html=weekdays.map(d=>`<div class="weekday">${d}</div>`).join('');for(let i=0;i<42;i++){const d=new Date(start);d.setDate(start.getDate()+i);const key=d.toISOString().slice(0,10),events=posts.filter(p=>String(p.date||'').slice(0,10)===key);html+=`<div class="day ${d.getMonth()!==cursor.getMonth()?'is-out':''}"><strong>${d.getDate()}</strong>${events.map(p=>`<a class="event ${p.contentType==='announcement'?'announcement':''} ${p.status!=='published'?'draft':''}" href="/admin/cms.html#/collections/blog/entries/${encodeURIComponent(p.cmsEntry)}">${esc(p.title)}</a>`).join('')}</div>`}cal.innerHTML=html}fetch('/assets/data/blog.json?v=final-1',{cache:'no-store'}).then(r=>r.json()).then(d=>{posts=d.posts||[];render()}).catch(()=>cal.innerHTML='<div class="empty">Takvim verisi yüklenemedi.</div>');document.getElementById('prev').onclick=()=>{cursor.setMonth(cursor.getMonth()-1);render()};document.getElementById('next').onclick=()=>{cursor.setMonth(cursor.getMonth()+1);render()};document.getElementById('today').onclick=()=>{cursor=new Date();cursor.setDate(1);render()}})();</script></body></html>
