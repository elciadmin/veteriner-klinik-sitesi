backend:
  name: git-gateway
  branch: main

site_url: "https://xn--eliveterinerklinii-8ub94i.com"
display_url: "https://xn--eliveterinerklinii-8ub94i.com"
logo_url: "/assets/img/uploads/elci-logo.png"

media_folder: "assets/img/uploads"
public_folder: "/assets/img/uploads"

# Taslak -> inceleme -> yayın akışı.
publish_mode: editorial_workflow
locale: "tr"

collections:
  - name: "blog_data"
    label: "Blog Yazıları"
    delete: false
    editor:
      preview: false
    files:
      - file: "assets/data/blog.json"
        label: "Blog Yazıları"
        name: "blog_file"
        format: "json"
        fields:
          - label: "Yazılar"
            name: "posts"
            widget: "list"
            summary: "{{fields.title}}"
            minimize_collapsed: true
            fields:
              - { label: "Yayında mı?", name: "published", widget: "boolean", default: true }
              - { label: "Başlık", name: "title", widget: "string" }
              - label: "Kısa bağlantı adı"
                name: "slug"
                widget: "string"
                hint: "Küçük harf ve tire kullanın. Örnek: kedilerde-asi-takvimi"
                pattern: ['^[a-z0-9]+(?:-[a-z0-9]+)*$', "Yalnızca küçük harf, rakam ve tire kullanın."]
              - { label: "Yayın tarihi", name: "date", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ssZ", date_format: "DD.MM.YYYY", time_format: "HH:mm" }
              - { label: "Kısa açıklama", name: "summary", widget: "text" }
              - { label: "Kapak görseli", name: "cover", widget: "image", required: false }
              - label: "Kategoriler"
                name: "categories"
                widget: "list"
                required: false
                field: { label: "Kategori", name: "category", widget: "string" }
              - label: "Etiketler"
                name: "tags"
                widget: "list"
                required: false
                field: { label: "Etiket", name: "tag", widget: "string" }
              - { label: "Yazar", name: "author", widget: "string", default: "Elçi Veteriner Kliniği" }
              - { label: "Tahmini okuma süresi (dakika)", name: "readingMinutes", widget: "number", value_type: "int", min: 1, default: 3 }
              - { label: "SEO başlığı", name: "seoTitle", widget: "string", required: false }
              - { label: "SEO açıklaması", name: "seoDescription", widget: "text", required: false }
              - label: "Yazının tam içeriği"
                name: "content"
                widget: "text"
                hint: "Paragraflar arasında bir boş satır bırakın."
              - { label: "YouTube video kimliği", name: "youtubeId", widget: "string", required: false }
              - { label: "Özel bağlantı", name: "url", widget: "string", required: false, hint: "Boş bırakılabilir." }

  - name: "faq_data"
    label: "Sık Sorulan Sorular"
    delete: false
    editor:
      preview: false
    files:
      - file: "assets/data/faq.json"
        label: "SSS Yönetimi"
        name: "faq_file"
        format: "json"
        fields:
          - { label: "Sayfa başlığı", name: "title", widget: "string", default: "Sık Sorulan Sorular" }
          - label: "Kategoriler"
            name: "groups"
            widget: "list"
            summary: "{{fields.category}}"
            minimize_collapsed: true
            fields:
              - { label: "Kategori yayında mı?", name: "published", widget: "boolean", default: true }
              - { label: "Kategori adı", name: "category", widget: "string" }
              - label: "Sorular"
                name: "items"
                widget: "list"
                summary: "{{fields.q}}"
                minimize_collapsed: true
                fields:
                  - { label: "Yayında mı?", name: "published", widget: "boolean", default: true }
                  - label: "Ana sayfada göster"
                    name: "showOnHome"
                    widget: "boolean"
                    default: false
                    required: false
                    hint: "Açık olduğunda bu soru ana sayfadaki Sık Sorulan Sorular bölümünde gösterilebilir."
                  - label: "Ana sayfa sırası"
                    name: "homeOrder"
                    widget: "number"
                    value_type: "int"
                    min: 1
                    max: 99
                    required: false
                    hint: "Ana sayfada gösterilen soruların sırası. 1 en üst sıradır."
                  - label: "Kimlik"
                    name: "id"
                    widget: "string"
                    hint: "Küçük harf ve tire kullanın. Örnek: muayene-ucreti"
                    pattern: ['^[a-z0-9]+(?:-[a-z0-9]+)*$', "Yalnızca küçük harf, rakam ve tire kullanın."]
                  - { label: "Soru", name: "q", widget: "string" }
                  - { label: "Yanıt", name: "a", widget: "text" }

  - name: "services_data"
    label: "Hizmetler"
    delete: false
    editor:
      preview: false
    files:
      - file: "assets/data/services.json"
        label: "Hizmet Yönetimi"
        name: "services_file"
        format: "json"
        fields:
          - { label: "Bölüm başlığı", name: "title", widget: "string", default: "Hizmetlerimiz" }
          - label: "Hizmetler"
            name: "items"
            widget: "list"
            summary: "{{fields.title}}"
            minimize_collapsed: true
            fields:
              - label: "Kimlik"
                name: "id"
                widget: "string"
                hint: "Mevcut hizmetlerde bu alanı değiştirmeyin."
              - { label: "Başlık", name: "title", widget: "string" }
              - { label: "Kısa açıklama", name: "summary", widget: "text" }
              - { label: "Detaylı açıklama", name: "detail", widget: "text", required: false }
              - { label: "İkon kimliği", name: "icon", widget: "string", required: false }
              - { label: "Bağlantı", name: "href", widget: "string", required: false }

  - name: "success_stories_data"
    label: "Başarı Hikâyeleri"
    delete: false
    editor:
      preview: false
    files:
      - file: "assets/data/successStories.json"
        label: "Başarı Hikâyeleri"
        name: "success_stories_file"
        format: "json"
        fields:
          - label: "Hikâyeler"
            name: "stories"
            widget: "list"
            summary: "{{fields.title}}"
            minimize_collapsed: true
            fields:
              - label: "Kimlik"
                name: "id"
                widget: "string"
                pattern: ['^[a-z0-9]+(?:-[a-z0-9]+)*$', "Yalnızca küçük harf, rakam ve tire kullanın."]
              - { label: "Başlık", name: "title", widget: "string" }
              - { label: "Hayvanın adı", name: "petName", widget: "string" }
              - { label: "Tür", name: "species", widget: "string", required: false }
              - { label: "Kısa vurgu", name: "tagline", widget: "string", required: false }
              - { label: "Kısa özet", name: "summary", widget: "text" }
              - { label: "Detaylı hikâye", name: "body", widget: "text" }
              - { label: "Simge kimliği", name: "icon", widget: "string", required: false, default: "#i-paw" }
              - { label: "Öne çıkar", name: "featured", widget: "boolean", default: false, required: false }
